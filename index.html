<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visor 3D</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    iframe {
      width: 90vw;
      height: 90vh;
      border: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      border-radius: 12px;
    }
  </style>
  <script>
    // Si el visitante está en un celular, redirige al visor en pantalla completa
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      window.location.href = "https://lucasmb-qf.github.io/modelos3d/";
    }
  </script>
</head>
<body>
  <!-- Solo se ve esto si no fue redirigido (escritorio) -->
  <iframe src="https://lucasmb-qf.github.io/modelos3d/"></iframe>
</body>
</html>
