<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Visor 3D - Horizontal</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #111;
      color: white;
    }

    #rotate-warning {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 1.5em;
    }

    .iframe-container {
      display: none;
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    @media (orientation: portrait) {
      #rotate-warning {
        display: block;
      }
    }

    @media (orientation: landscape) {
      .iframe-container {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div id="rotate-warning">
    📱 Por favor, gira tu celular horizontalmente para ver el modelo 3D.
  </div>

  <div class="iframe-container">
    <iframe src="https://lucasmb-qf.github.io/modelos3d/" title="Visor 3D"></iframe>
  </div>
</body>
</html>
