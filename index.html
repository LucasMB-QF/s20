<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor 3D</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      background-color: #f4f4f4;
    }

    .iframe-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      margin: auto;
      padding-top: 56.25%; /* Relación 16:9 */
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }
  </style>
  <script>
    if (/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      // Redirigir a pantalla completa si es celular
      window.location.href = "https://lucasmb-qf.github.io/modelos3d/";
    }
  </script>
</head>
<body>
  <div class="iframe-container">
    <iframe src="https://lucasmb-qf.github.io/modelos3d/"></iframe>
  </div>
</body>
</html>
