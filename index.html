<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solati 20% de carga: distribución de data loggers | Transfarma</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* VARIABLES PARA MODO OSCURO/CLARO */
    :root {
      --bg-color: #121212;          /* Fondo oscuro predeterminado */
      --text-color: #e0e0e0;        /* Texto claro */
      --container-bg: #1e1e1e;      /* Fondo del contenedor */
      --border-color: #333;         /* Bordes */
      --shadow-color: rgba(0,0,0,0.3); /* Sombras */
      --toggle-icon: '\f185';       /* Icono de sol (modo claro) */
    }

    [data-theme="light"] {
      --bg-color: #f5f5f5;
      --text-color: #333;
      --container-bg: #fff;
      --border-color: #ddd;
      --shadow-color: rgba(0,0,0,0.1);
      --toggle-icon: '\f186';       /* Icono de luna (modo oscuro) */
    }

    /* ESTILOS BASE */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s, color 0.3s;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      padding: 20px;
      min-height: 100vh;
    }

    /* CONTENEDOR PRINCIPAL */
    .visor-container {
      max-width: 100%;              /* Ocupa todo el ancho disponible */
      width: 100%;
      margin: 0 auto;
      background: var(--container-bg);
      padding: 20px;
      box-shadow: 0 0 15px var(--shadow-color);
      border-radius: 10px;
      border: 1px solid var(--border-color);
    }

    /* TÍTULOS */
    h2 {
      color: var(--text-color);
      margin-bottom: 15px;
      font-size: 1.5rem;
      text-align: center;
    }

    /* IFRAME DEL VISOR 3D */
    iframe {
      width: 100%;
      height: 75vh;                 /* 75% del alto de la ventana */
      min-height: 500px;            /* Altura mínima */
      border: none;
      border-radius: 8px;
      background: #000;             /* Fondo negro para el visor */
    }

    /* BOTÓN TOGGLE MODO OSCURO/CLARO */
    .theme-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: var(--container-bg);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 10px var(--shadow-color);
      border: 1px solid var(--border-color);
      z-index: 100;
    }

    .theme-toggle::before {
      content: var(--toggle-icon);
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      color: var(--text-color);
      font-size: 1.2rem;
    }

    /* LOGO Y ENCABEZADO (opcional) */
    .logo-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo {
      height: 50px;
      margin-bottom: 10px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      body {
        padding: 15px;
      }
      
      .visor-container {
        padding: 15px;
      }
      
      iframe {
        height: 65vh;
        min-height: 400px;
      }
    }
  </style>
</head>
<body data-theme="dark"> <!-- Modo oscuro predeterminado -->
  <!-- ENCABEZADO OPCIONAL (puedes descomentar si lo necesitas) -->
  <!--
  <div class="logo-header">
    <img src="https://transfarma.cl/wp-content/uploads/2024/06/logo-transfarma-vec.png" alt="Logo" class="logo">
    <h2>Solati 20% de carga: distribución de data loggers</h2>
  </div>
  -->

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="visor-container">
    <h2>Visor 3D de distribución de data loggers</h2>
    <iframe src="https://lucasmb-qf.github.io/modelos3d/" allowfullscreen></iframe>
  </div>

  <!-- BOTÓN TOGGLE MODO OSCURO/CLARO -->
  <div class="theme-toggle" id="themeToggle"></div>

  <!-- SCRIPT PARA CAMBIAR TEMA -->
  <script>
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    
    // Establecer modo oscuro como predeterminado
    const defaultTheme = 'dark';
    
    // Cargar preferencia guardada o usar predeterminado
    const savedTheme = localStorage.getItem('theme') || defaultTheme;
    body.setAttribute('data-theme', savedTheme);
    
    // Cambiar tema al hacer clic
    themeToggle.addEventListener('click', () => {
      const currentTheme = body.getAttribute('data-theme');
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      body.setAttribute('data-theme', newTheme);
      localStorage.setItem('theme', newTheme);
    });
  </script>
</body>
</html>
